server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hiresphere}
    username: ${DB_USER:hsadmin}
    password: ${DB_PASSWORD:localpassword}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

grpc:
  server:
    port: 9093

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}

sqs:
  booking-events-queue-url: ${SQS_BOOKING_EVENTS_URL:http://localhost:4566/000000000000/hiresphere-booking-events}

aws:
  region: ${AWS_REGION:us-east-1}

resilience4j:
  circuitbreaker:
    instances:
      stripe:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
  retry:
    instances:
      sqs:
        max-attempts: 3
        wait-duration: 500ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
