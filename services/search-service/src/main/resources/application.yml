server:
  port: 8082

spring:
  application:
    name: search-service
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

services:
  profile:
    url: ${SERVICES_PROFILE_URL:http://localhost:8081}

resilience4j:
  circuitbreaker:
    instances:
      profile-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      profile-service:
        max-attempts: 3
        wait-duration: 300ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.hiresphere: DEBUG
