# AWS Load Balancer Controller Ingress
# Provisions an Application Load Balancer automatically.
# Prerequisites:
#   helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system \
#     --set clusterName=hiresphere-cluster \
#     --set serviceAccount.create=false \
#     --set serviceAccount.name=aws-load-balancer-controller

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hiresphere-ingress
  namespace: hiresphere
  annotations:
    kubernetes.io/ingress.class:                      alb
    alb.ingress.kubernetes.io/scheme:                 internet-facing
    alb.ingress.kubernetes.io/target-type:            ip
    alb.ingress.kubernetes.io/healthcheck-path:       /actuator/health
    alb.ingress.kubernetes.io/healthcheck-port:       "8080"
    # HTTPS — add your ACM certificate ARN here
    # alb.ingress.kubernetes.io/certificate-arn:      arn:aws:acm:us-east-1:ACCOUNT:certificate/xxx
    alb.ingress.kubernetes.io/listen-ports:           '[{"HTTP":80}]'
    # WebSocket support — required for Live Session signaling
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
    alb.ingress.kubernetes.io/waf-acl-id:            ""
spec:
  rules:
    - http:
        paths:
          # ALL traffic enters through Spring Cloud Gateway
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
