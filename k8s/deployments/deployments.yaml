# ── API GATEWAY ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hiresphere
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      serviceAccountName: default-service-sa
      containers:
        - name: api-gateway
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/hiresphere/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef: { name: hiresphere-global-config }
            - configMapRef: { name: api-gateway-config }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "500m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
---
