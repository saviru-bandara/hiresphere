# IAM Roles for Service Accounts (IRSA)
# Each service gets its own ServiceAccount annotated with the IAM role ARN
# provisioned by CloudFormation. This gives pods scoped AWS permissions
# without any static credentials in the container.
#
# Replace ACCOUNT_ID and REGION before applying.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: profile-service-sa
  namespace: hiresphere
  annotations:
    # Grants DynamoDB access to Profiles + Messages tables
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/hiresphere-profile-service-role

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: booking-service-sa
  namespace: hiresphere
  annotations:
    # Grants SQS SendMessage + Secrets Manager read
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/hiresphere-booking-service-role

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: submission-service-sa
  namespace: hiresphere
  annotations:
    # Grants S3 PutObject/GetObject + SQS SendMessage
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/hiresphere-submission-service-role

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: messaging-service-sa
  namespace: hiresphere
  annotations:
    # Grants DynamoDB access to Messages table + SQS
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/hiresphere-profile-service-role

---
# Services with no direct AWS access use the default SA
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default-service-sa
  namespace: hiresphere
