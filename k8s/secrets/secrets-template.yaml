# ⚠️  DO NOT commit real values — this is a template only.
# The deploy script (scripts/deploy.sh) fetches real values
# from AWS Secrets Manager and applies them via:
#   kubectl create secret generic ... --from-literal=...
#
# To create manually:
#   kubectl create secret generic hiresphere-secrets -n hiresphere \
#     --from-literal=DB_HOST=<rds-endpoint> \
#     --from-literal=DB_USER=hsadmin \
#     --from-literal=DB_PASSWORD=<password> \
#     --from-literal=STRIPE_SECRET_KEY=<stripe-key>

apiVersion: v1
kind: Secret
metadata:
  name: hiresphere-secrets
  namespace: hiresphere
type: Opaque
stringData:
  DB_HOST:           "REPLACE_FROM_SECRETS_MANAGER"
  DB_USER:           "REPLACE_FROM_SECRETS_MANAGER"
  DB_PASSWORD:       "REPLACE_FROM_SECRETS_MANAGER"
  STRIPE_SECRET_KEY: "REPLACE_FROM_SECRETS_MANAGER"
