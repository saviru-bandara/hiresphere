---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hiresphere
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  namespace: hiresphere
  labels:
    app: profile-service
spec:
  selector:
    app: profile-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: grpc
      port: 9091
      targetPort: 9091
  type: ClusterIP

