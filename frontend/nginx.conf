server {
    listen       3000;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── React Router SPA fallback ─────────────────────────────────────────────
    # Any path that doesn't match a static file falls back to index.html
    # so React Router handles the routing client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to Spring Cloud Gateway ────────────────────────────────────
    # Avoids CORS issues in local dev — browser calls /api/* on port 3000,
    # nginx proxies to the gateway on port 8080
    location /api/ {
        proxy_pass         http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket proxy to Live Session Service ───────────────────────────────
    location /ws/ {
        proxy_pass         http://live-session-service:8086/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # Keep WebSocket alive for long sessions
        proxy_send_timeout 3600s;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}